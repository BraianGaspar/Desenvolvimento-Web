<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Cadastro</title>
</head>

<body>
  <h1>Página de Cadastro</h1>

  <form action="#" method="post">
    <fieldset>
      <legend>Crie sua Conta</legend>

      <div>
        <label for="nome">Nome:</label>
      </div>
      <div>
        <input type="text" id="nome" name="nome"/>
      </div>

      <div>
        <label for="email">E-mail:</label>
      </div>
      <div>
        <input type="email" id="email" name="email" required  placeholder="Seuemail@dominio.com"/>
      </div>

      <div>
        <label for="senha">Senha:</label>
      </div>
      <div>
        <input type="password" id="senha" name="senha" minlength="8" required />
      </div>

      <div>
        <strong>Gênero:</strong>
      </div>
      <div>
        <label>
          <input type="radio" name="genero" value="feminino" /> Feminino
        </label>
      </div>
      <div>
        <label>
          <input type="radio" name="genero" value="masculino" /> Masculino
        </label>
      </div>

      <div>
        <label for="biografia">Biografia:</label>
      </div>
      <div>
        <textarea id="biografia" name="biografia" rows="6" placeholder="Digite aqui sua biografia..."></textarea>
      </div>

      <div>
        <input type="checkbox" id="termos" name="termos" value="aceito" required />
        <label for="termos">Eu li e aceito os termos de serviço.</label>
      </div>
    </fieldset>

    <div>
      <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>
    </div>

  </form>
</body>

</html>
