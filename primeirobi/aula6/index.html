<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List | Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h1>Minhas Tarefas</h1>

        <div class="input-section">
          <input
            type="text"
            id="taskInput"
            placeholder="Digite uma nova tarefa..."
          />
          <button id="addButton">Adicionar</button>
        </div>

        <ul id="taskList"></ul>

        <div class="info">
          <p>Clique em qualquer tarefa para removê-la</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
